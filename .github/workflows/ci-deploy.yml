name: CI → Dev Tag → Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: cd frontend && npx vue-tsc --noEmit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Python import check
        run: cd backend && python -c "from app.api.routes import router; print('Routes OK')"

  build-frontend:
    name: Build Frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install & build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package frontend dist
        run: tar -czf frontend-dist.tar.gz -C frontend/dist .

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 30

  tag:
    name: Dev Tag + Deploy
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Get latest dev tag and bump
        id: version
        run: |
          # 找最新的 dev tag (v0.x.x-dev.N)
          LATEST_DEV=$(git tag -l "v*-dev.*" --sort=-v:refname | head -1)
          LATEST_STABLE=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]" --exclude "*-*" 2>/dev/null || echo "v0.0.0")

          echo "Latest stable: $LATEST_STABLE"
          echo "Latest dev: $LATEST_DEV"

          # 從穩定版取 base
          STABLE_VER=${LATEST_STABLE#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$STABLE_VER"
          NEXT_PATCH=$((PATCH + 1))

          # 找同 base 版本的最大 dev 編號
          MAX_DEV=$(git tag -l "v${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.*" --sort=-v:refname | head -1)
          if [ -n "$MAX_DEV" ]; then
            DEV_NUM=$(echo "$MAX_DEV" | grep -o 'dev\.[0-9]*' | cut -d. -f2)
            DEV_NUM=$((DEV_NUM + 1))
          else
            DEV_NUM=1
          fi

          NEW="v${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${DEV_NUM}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "new_bare=${MAJOR}.${MINOR}.${PATCH}-dev.${DEV_NUM}" >> "$GITHUB_OUTPUT"
          echo "Tagging: $NEW"

      - name: Create dev tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.version.outputs.new }} -m "CI: ${{ steps.version.outputs.new }}"
          git push origin ${{ steps.version.outputs.new }}

      - name: Create GitHub Release with frontend dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.version.outputs.new }} \
            frontend-dist.tar.gz \
            --title "${{ steps.version.outputs.new }}" \
            --notes "CI auto-release" \
            --prerelease

      - name: Trigger GCP hot update
        run: |
          RESPONSE=$(curl -s --max-time 15 -X POST https://aegis.yooliang.com/api/v1/update/apply \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"${{ steps.version.outputs.new_bare }}\"}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || (echo "Deploy trigger failed!" && exit 1)

      - name: Wait for deploy
        run: |
          echo "Waiting 30s for update to start..."
          sleep 30

          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s --max-time 10 https://aegis.yooliang.com/api/v1/update/status 2>/dev/null || echo '{}')
            echo "Attempt $i: $STATUS"

            VERSION=$(echo "$STATUS" | grep -o '"current_version":"[^"]*"' | cut -d'"' -f4)
            STAGE=$(echo "$STATUS" | grep -o '"update_stage":"[^"]*"' | cut -d'"' -f4)
            IS_UPDATING=$(echo "$STATUS" | grep -o '"is_updating":[a-z]*' | cut -d: -f2)

            # 服務重啟後版本已更新 = 成功
            if echo "$VERSION" | grep -q "dev.${{ steps.version.outputs.new }}"; then
              echo "Deploy successful! Version: $VERSION"
              exit 0
            fi

            if [ "$STAGE" = "idle" ] && [ "$IS_UPDATING" = "false" ] && [ "$i" -gt 2 ]; then
              echo "Deploy completed (stage idle). Version: $VERSION"
              exit 0
            fi

            if [ "$STAGE" = "failed" ]; then
              echo "Deploy failed!"
              exit 1
            fi

            echo "Still deploying (stage: $STAGE, version: $VERSION), waiting 15s..."
            sleep 15
          done

          echo "Deploy timeout - check manually"
          exit 1
